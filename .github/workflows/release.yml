name: Release Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version }}
          release_name: Ownsight v${{ github.event.inputs.version }}
          body: |
            ## Ownsight v${{ github.event.inputs.version }} - Rust Ownership Visualizer
            
            ### 🎉 What's New
            Interactive visualization tool for understanding Rust ownership and borrowing.
            
            ### 📦 Installation
            
            **CLI Tool:**
            ```bash
            cargo install ownsight-cli
            ```
            
            **Desktop App:**
            - **macOS**: Download the `.dmg` file below
            - **Linux**: Download the `.AppImage` file below
            - **Windows**: Download the `.msi` installer below
            
            ### ✨ Features
            - Interactive timeline view with step-by-step events
            - Graph visualization of ownership relationships
            - Monaco code editor with syntax highlighting
            - Query interface for debugging questions
            - Teaching and debug modes
            
            ### 📚 Documentation
            - [Quick Start Guide](https://github.com/dedsecrattle/ownsight/blob/main/QUICKSTART.md)
            - [Architecture](https://github.com/dedsecrattle/ownsight/blob/main/ARCHITECTURE.md)
            - [Full README](https://github.com/dedsecrattle/ownsight/blob/main/README.md)
            
            ### 🐛 Found a bug?
            Please report it in the [Issues](https://github.com/dedsecrattle/ownsight/issues) section.
          draft: false
          prerelease: false

  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libsoup-2.4-dev patchelf imagemagick

      - name: Install dependencies (windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install imagemagick -y

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './ui/src-tauri -> target'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: |
          cd ui
          bun install

      - name: Generate app icons
        run: |
          cd ui/src-tauri/icons
          chmod +x generate-icons.sh
          ./generate-icons.sh

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ui
          tagName: v${{ github.event.inputs.version }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
