name: Publish to crates.io

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      crate:
        description: 'Crate to publish (ownsight-core, ownsight-driver, ownsight-mir, ownsight-cli, or all)'
        required: true
        default: 'all'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify crates can be packaged
        run: |
          cargo package --package ownsight-core --allow-dirty
          cargo package --package ownsight-driver --allow-dirty
          cargo package --package ownsight-mir --allow-dirty
          cargo package --package ownsight-cli --allow-dirty

      - name: Publish ownsight-core
        if: github.event.inputs.crate == 'all' || github.event.inputs.crate == 'ownsight-core' || startsWith(github.ref, 'refs/tags/')
        run: cargo publish --package ownsight-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: false

      - name: Wait for ownsight-core to be available
        if: github.event.inputs.crate == 'all' || startsWith(github.ref, 'refs/tags/')
        run: sleep 30

      - name: Publish ownsight-driver
        if: github.event.inputs.crate == 'all' || github.event.inputs.crate == 'ownsight-driver' || startsWith(github.ref, 'refs/tags/')
        run: cargo publish --package ownsight-driver --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: false

      - name: Wait for ownsight-driver to be available
        if: github.event.inputs.crate == 'all' || startsWith(github.ref, 'refs/tags/')
        run: sleep 30

      - name: Publish ownsight-mir
        if: github.event.inputs.crate == 'all' || github.event.inputs.crate == 'ownsight-mir' || startsWith(github.ref, 'refs/tags/')
        run: cargo publish --package ownsight-mir --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: false

      - name: Wait for ownsight-mir to be available
        if: github.event.inputs.crate == 'all' || startsWith(github.ref, 'refs/tags/')
        run: sleep 30

      - name: Publish ownsight-cli
        if: github.event.inputs.crate == 'all' || github.event.inputs.crate == 'ownsight-cli' || startsWith(github.ref, 'refs/tags/')
        run: cargo publish --package ownsight-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: false
